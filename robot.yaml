# raspi-roboarm configuration
# Edit angles here and re-run — no code changes needed.
#
#   min / max     — safe travel limits (degrees); motion is clamped to this range
#   resting       — home position on startup and for `roboarm home`
#   channel       — PCA9685 header (alternating: 0, 2, 4, 6, 8, 10)
#   enabled       — set true only for servos you have physically wired
#   min_pulse_us / max_pulse_us — optional; set via `roboarm calibrate`
#                                 (saved to robot.calibration.yaml, gitignored)

board:
  address: 0x40
  freq_hz: 50

motion:
  default_speed_dps: 60   # global speed cap (lower = gentler under load)
  update_hz: 50            # interpolation rate
  max_steps: 40            # more steps = smoother (each step is one I2C write)
  min_steps: 12            # never fewer than this — avoids jerky heavy moves
  stagger_joints: true     # poses/home: move one joint at a time (less peak current)
  attach_on_start: true
  hold_on_exit: true

joints:
  - name: base
    channel: 0
    enabled: true
    max_speed: 80            # deg/sec cap for this joint (optional)
    min: 0
    max: 180
    resting: 90

  - name: shoulder
    channel: 2
    enabled: true
    max_speed: 35            # heaviest joint — keep slow
    min: 0
    max: 160
    resting: 0

  - name: elbow
    channel: 4
    enabled: true
    max_speed: 40
    min: 45
    max: 160
    resting: 45

  - name: wrist
    channel: 6
    enabled: true
    max_speed: 70
    min: 25
    max: 147
    resting: 90

  - name: wrist_rot
    channel: 8
    enabled: true
    max_speed: 80
    min: 0
    max: 150
    resting: 90

  - name: gripper
    channel: 10
    enabled: true
    max_speed: 90
    min: 60
    max: 110
    resting: 90

# Named poses — reach them with `roboarm pose <name>`.
# All angles are inside the joint limits above. Tweak freely; motion is clamped.
# gripper: 60 = open, 110 = closed (swap if yours is reversed).
poses:
  home:        { base: 90,  shoulder: 0,   elbow: 45,  wrist: 90,  wrist_rot: 90, gripper: 90 }
  ready:       { base: 90,  shoulder: 60,  elbow: 100, wrist: 90,  wrist_rot: 90, gripper: 90 }
  reach_out:   { base: 90,  shoulder: 80,  elbow: 140, wrist: 80,  wrist_rot: 90, gripper: 60 }
  park:        { base: 90,  shoulder: 10,  elbow: 50,  wrist: 40,  wrist_rot: 90, gripper: 110 }
  look_left:   { base: 150, shoulder: 60,  elbow: 100, wrist: 90,  wrist_rot: 90, gripper: 90 }
  look_right:  { base: 30,  shoulder: 60,  elbow: 100, wrist: 90,  wrist_rot: 90, gripper: 90 }
  gripper_open:  { gripper: 60 }
  gripper_close: { gripper: 110 }
