# raspi-roboarm configuration
# Edit angles here and re-run — no code changes needed.
#
#   min / max     — safe travel limits (degrees); motion is clamped to this range
#   resting       — home position on startup and for `roboarm home`
#   channel       — PCA9685 header (alternating: 0, 2, 4, 6, 8, 10)
#   enabled       — set true only for servos you have physically wired
#   min_pulse_us / max_pulse_us — optional; set via `roboarm calibrate`
#                                 (saved to robot.calibration.yaml, gitignored)

board:
  address: 0x40
  freq_hz: 50

motion:
  default_speed_dps: 90    # deg/sec — try 60 if shoulder struggles on power alone
  update_hz: 60
  max_steps: 30            # cap on interpolation steps (each = one I2C write)
  max_deg_per_step: 2.0    # no joint jumps more than this per tick
  profile: linear        # linear = steady speed under load; smooth = ease-in/out
  stagger_joints: false    # false = all joints move together (stable). true = one-by-one (jerky)
  attach_on_start: true
  hold_on_exit: true

joints:
  - name: base
    channel: 0
    enabled: true
    min: 0
    max: 180
    resting: 90

  - name: shoulder
    channel: 2
    enabled: true
    min: 0
    max: 160
    resting: 0

  - name: elbow
    channel: 4
    enabled: true
    min: 50
    max: 160
    resting: 50

  - name: wrist
    channel: 6
    enabled: true
    min: 25
    max: 147
    resting: 90

  - name: wrist_rot
    channel: 8
    enabled: true
    min: 0
    max: 150
    resting: 90

  - name: gripper
    channel: 10
    enabled: true
    min: 60
    max: 110
    resting: 90

# Named poses — reach them with `roboarm pose <name>`.
# gripper: 60 = open, 110 = closed (swap if yours is reversed).
poses:
  home:        { base: 90,  shoulder: 0,   elbow: 50,  wrist: 90,  wrist_rot: 90, gripper: 90 }
  ready:       { base: 90,  shoulder: 60,  elbow: 100, wrist: 90,  wrist_rot: 90, gripper: 90 }
  reach_out:   { base: 90,  shoulder: 80,  elbow: 140, wrist: 80,  wrist_rot: 90, gripper: 60 }
  park:        { base: 90,  shoulder: 10,  elbow: 50,  wrist: 40,  wrist_rot: 90, gripper: 110 }
  look_left:   { base: 150, shoulder: 60,  elbow: 100, wrist: 90,  wrist_rot: 90, gripper: 90 }
  look_right:  { base: 30,  shoulder: 60,  elbow: 100, wrist: 90,  wrist_rot: 90, gripper: 90 }
  gripper_open:  { gripper: 60 }
  gripper_close: { gripper: 110 }

# --- Arm geometry for inverse kinematics (roboarm reach / roboarm fk) --------
# Lets you say "put the gripper at (x, y, z)" instead of setting each joint.
# This is OPTIONAL — every other command works without it.
#
# HOW TO TUNE (takes ~10 min, no code changes):
#   1. Measure the link lengths with a ruler and put them below (any unit,
#      just be consistent — mm recommended). Coordinates you pass to `reach`
#      use the same unit.
#   2. Map each joint's "kinematic" angle to its servo angle:
#        servo_angle = zero_deg + sign * kinematic_angle
#      Kinematic zero means:
#        base     0 = arm points straight forward (+X)
#        shoulder 0 = upper arm horizontal        (+ = tilts up)
#        elbow    0 = arm fully straight          (+/- = bend)
#        wrist    0 = hand in line with forearm    (+ = tilts up)
#   3. Move the arm to a known pose, run `roboarm fk`, and adjust zero_deg/sign
#      until the reported (x, y, z) matches reality. Then `reach` will be right.
geometry:
  units: mm
  shoulder_height: 100     # table up to the shoulder joint axis  (MEASURE)
  upper_arm: 105          # shoulder axis -> elbow axis           (MEASURE)
  forearm: 100            # elbow axis -> wrist axis              (MEASURE)
  hand: 150                # wrist axis -> gripper tip             (MEASURE)
  elbow: up               # default elbow bend: up or down
  joints:
    base:     { zero_deg: 90, sign: 1 }    # servo 90 = pointing forward
    shoulder: { zero_deg: -60, sign: 1 }   # tuned: ready shoulder 60° servo = 120° kin
    elbow:    { zero_deg: 20, sign: -1 }    # tuned: ready elbow 100° servo = -80° kin
    wrist:    { zero_deg: 0, sign: -1 }    # tuned: ready wrist 90° servo = -90° kin
