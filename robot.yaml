# raspi-roboarm configuration
# Edit angles here and re-run — no code changes needed.
#
#   min / max     — safe travel limits (degrees); motion is clamped to this range
#   channel       — PCA9685 header (alternating: 0, 2, 4, 6, 8, 10)
#   enabled       — set true only for servos you have physically wired
#   min_pulse_us / max_pulse_us — optional; set via `roboarm calibrate`
#                                 (saved to robot.calibration.yaml, gitignored)
#
# Home angles live in poses.home — `roboarm home` uses that pose (not per-joint fields).

board:
  address: 0x40
  freq_hz: 50

motion:
  default_speed_dps: 90    # deg/sec — try 60 if shoulder struggles on power alone
  update_hz: 60
  max_steps: 30            # cap on interpolation steps (each = one I2C write)
  max_deg_per_step: 2.0    # no joint jumps more than this per tick
  profile: linear        # linear = steady speed under load; smooth = ease-in/out
  stagger_joints: false    # false = all joints move together (stable). true = one-by-one (jerky)
  attach_on_start: true
  hold_on_exit: true

joints:
  - name: base
    channel: 0
    enabled: true
    min: 0
    max: 180

  - name: shoulder
    channel: 2
    enabled: true
    min: 0
    max: 180

  - name: elbow
    channel: 4
    enabled: true
    min: 30          # travel limit — pulse map uses pulse_min_angle in robot.calibration.yaml
    max: 180

  - name: wrist
    channel: 6
    enabled: true
    min: 0
    max: 180

  - name: wrist_rot
    channel: 8
    enabled: true
    min: 0
    max: 150

  - name: gripper
    channel: 10
    enabled: true
    min: 82
    max: 110

# Named poses — reach them with `roboarm pose <name>` or `roboarm home` (uses home).
# Angles are servo° within joints.min/max, tuned for geometry.joints calibration.
# gripper: 60 = open, 110 = closed (swap if yours is reversed).
poses:
  home:        { base: 90,  shoulder: 0,   elbow: 45, wrist: 90,  wrist_rot: 90, gripper: 90 }   # shoulder 0 — elbow needs ~110° to clear
  ready:       { base: 90,  shoulder: 60,  elbow: 90, wrist: 90,  wrist_rot: 90, gripper: 90 }   # calibrated working pose
  reach_out:   { base: 90,  shoulder: 45,  elbow: 90, wrist: 85,  wrist_rot: 90, gripper: 60 }   # extended, shy of limits
  park:        { base: 90,  shoulder: 0,   elbow: 60, wrist: 90,  wrist_rot: 90, gripper: 110 }  # home + gripper closed
  look_left:   { base: 150, shoulder: 60,  elbow: 90, wrist: 90,  wrist_rot: 90, gripper: 90 }   # ready + base left
  look_right:  { base: 30,  shoulder: 60,  elbow: 90, wrist: 90,  wrist_rot: 90, gripper: 90 }   # ready + base right
  gripper_open:  { gripper: 60 }
  gripper_close: { gripper: 110 }

# --- Arm geometry for inverse kinematics (roboarm reach / roboarm fk) --------
# Lets you say "put the gripper at (x, y, z)" instead of setting each joint.
# This is OPTIONAL — every other command works without it.
#
# HOW TO TUNE (takes ~10 min, no code changes):
#   1. Measure the link lengths with a ruler and put them below (any unit,
#      just be consistent — mm recommended). Coordinates you pass to `reach`
#      use the same unit.
#   2. Map each joint's "kinematic" angle to its servo angle:
#        servo_angle = zero_deg + sign * kinematic_angle
#      Kinematic zero means:
#        base     0 = arm points straight forward (+X)
#        shoulder 0 = upper arm horizontal        (+ = tilts up)
#        elbow    0 = arm fully straight          (+/- = bend)
#        wrist    0 = hand in line with forearm    (+ = tilts up)
#   3. Move the arm to a known pose, run `roboarm fk`, and adjust zero_deg/sign
#      until the reported (x, y, z) matches reality. Then `reach` will be right.
geometry:
  units: mm
  shoulder_height: 100     # table up to the shoulder joint axis  (MEASURE)
  upper_arm: 105          # shoulder axis -> elbow axis           (MEASURE)
  forearm: 100            # elbow axis -> wrist pitch axis        (MEASURE)
  wrist_rot_offset: 30    # wrist pitch axis -> wrist_rot axis (+Z in arm plane)
  hand: 140               # wrist_rot axis -> gripper tip (centerline) (MEASURE)
  gripper_motor: 70       # wrist_rot axis -> gripper servo (MEASURE)
  gripper_offset: -10     # tip lateral offset (mm); negative = left
  elbow: up               # preferred IK branch; keeps elbow servo in 30..180° travel
                          #   (IK auto-tries the other branch if this one won't fit)
  joints:
    base:     { zero_deg: 90, sign: 1 }    # servo 90 = pointing forward
    shoulder: { zero_deg: 180, sign: -1 }  # kin = 180 − servo°  (0→180, 60→120, 180→0)
    elbow:    { zero_deg: 180, sign: 1 }   # kin = servo − 180° (180=s straight, lower servo = more fold)
    wrist:    { zero_deg: 0, sign: -1 }    # tuned: ready wrist 90° servo = -90° kin
    wrist_rot: { zero_deg: 90, sign: 1 }  # servo 90 = no roll
